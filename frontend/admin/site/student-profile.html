<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMS Student Portal - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

<body data-page="settings" data-title="Settings" data-breadcrumb="Settings">
  <div id="student-page-content" hidden>
    <div class="teacher-grid">
      <article class="teacher-card" style="padding:24px 28px;">
        <div class="teacher-card-head">
          <div>
            <div class="teacher-card-title">Security Settings</div>
            <div class="teacher-card-sub">Reset your password from your registered email. Your current password stays active until you finish the reset.</div>
          </div>
        </div>
        <div style="margin-top:20px;display:grid;gap:16px;">
          <div class="teacher-field">
            <label>Registered Email</label>
            <input id="student-settings-email" disabled />
          </div>
          <div style="display:flex;justify-content:flex-start;">
            <button class="teacher-btn-outline" id="student-send-reset" type="button">Send Password Reset Email</button>
          </div>
        </div>
      </article>
    </div>
  </div>
  <script src="./ems-config.js?v=1776115672630"></script>
  <script src="./ems-realtime.js?v=1776115672630"></script>
  <script src="./student-shared.js?v=1776115672630"></script>
